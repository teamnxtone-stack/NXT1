# NXT1 — Self-Host docker-compose
#
# Brings up Postiz (social) + Resume-Matcher + Redis + Postgres alongside
# NXT1 itself. Spin up:
#   docker compose -f docker-compose.agentos.yml up -d
#
# Then in /app/backend/.env add:
#   POSTIZ_URL=http://localhost:5000
#   POSTIZ_API_KEY=<token-from-postiz-admin>
#   RESUME_MATCHER_URL=http://localhost:8002
#   REDIS_URL=redis://localhost:6379
# And in /app/frontend/.env:
#   REACT_APP_POSTIZ_URL=http://localhost:5000
#
# NXT1 itself stays on whatever supervisor / direct process you already run.
# Real Celery workers swap in by setting CELERY_BROKER_URL=redis://localhost:6379
# (the agentos_runner currently runs in-process; see services/agentos_runner.py).
version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: nxt1-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    container_name: nxt1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: postiz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postiz:
    # Social media scheduling — replaces any existing social impl per the spec.
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: nxt1-postiz
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "5000:5000"
    environment:
      MAIN_URL: http://localhost:5000
      FRONTEND_URL: http://localhost:5000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:5000/api
      JWT_SECRET: ${POSTIZ_SECRET_KEY:-please-change-me}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/postiz
      REDIS_URL: redis://redis:6379
      STORAGE_PROVIDER: local
      UPLOAD_DIRECTORY: /uploads
    volumes:
      - postiz_uploads:/uploads

  resume-matcher:
    # https://github.com/srbhr/Resume-Matcher — keyword gap analysis service.
    image: ghcr.io/srbhr/resume-matcher:latest
    container_name: nxt1-resume-matcher
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  # LiveKit voice (Deepgram + Cartesia) — uncomment if you want voice now.
  # livekit-agent:
  #   image: livekit/agents-worker:latest
  #   restart: unless-stopped
  #   environment:
  #     LIVEKIT_URL: ${LIVEKIT_URL}
  #     LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
  #     LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
  #     DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
  #     CARTESIA_API_KEY: ${CARTESIA_API_KEY}

volumes:
  redis_data:
  postgres_data:
  postiz_uploads:
